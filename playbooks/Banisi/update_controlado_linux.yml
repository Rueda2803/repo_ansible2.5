---
- name: Verificación y Actualización de Sistema en Red Hat
  hosts: all
  vars:
    # Ruta del log. Por defecto se guardará en la máquina donde corres Ansible
    log_path: "/tmp/logs_actualizaciones"

  tasks:

  - name: 1. Crear el directorio de logs local si no existe
    delegate_to: localhost
    become: false
    ansible.builtin.file:
      path: "{{ log_path }}"
      state: directory
      mode: '0755'

  - name: 2. Verificar actualizaciones pendientes (Simulación)
    ansible.builtin.dnf:
      list: updates
    register: dnf_updates

  - name: 3. Guardar el reporte de actualizaciones en un archivo de log
    delegate_to: localhost
    become: false
    ansible.builtin.copy:
      content: |
        ==================================================
        REPORTE DE ACTUALIZACIONES PENDIENTES
        Servidor: {{ inventory_hostname }}
        Fecha: {{ ansible_date_time.date }} {{ ansible_date_time.time }}
        ==================================================
        {% if dnf_updates.results | length > 0 %}
        {% for package in dnf_updates.results %}
        - {{ package.name }} (Versión: {{ package.version }}-{{ package.release }})
        {% endfor %}
        {% else %}
        No hay actualizaciones pendientes.
        {% endif %}
      dest: "{{ log_path }}/updates_{{ inventory_hostname }}_{{ ansible_date_time.date }}.log"
      mode: '0644'
