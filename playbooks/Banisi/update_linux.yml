---
- name: Actualización de paquetes Linux (Oracle Linux, RHEL y CentOS)
  hosts: all
  become: true
  gather_facts: true

  tasks:

  - name: Actualizar todos los paquetes en Oracle Linux 7/8/9
    ansible.builtin.yum:
      name: "*"
      state: latest
      update_cache: true
    when:
    - ansible_facts['ansible_distribution'] == "OracleLinux"
    - ansible_facts['ansible_distribution_major_version'] in ['7', '8', '9']

  - name: Actualizar todos los paquetes en RHEL 6
    ansible.builtin.yum:
      name: "*"
      state: latest
      update_cache: true
    when:
    - ansible_facts['ansible_distribution'] == "RedHat"
    - ansible_facts['ansible_distribution_major_version'] == "6"

  - name: Actualizar todos los paquetes en CentOS 6
    ansible.builtin.yum:
      name: "*"
      state: latest
      update_cache: true
    when:
    - ansible_facts['ansible_distribution'] == "CentOS"
    - ansible_facts['ansible_distribution_major_version'] == "6"
