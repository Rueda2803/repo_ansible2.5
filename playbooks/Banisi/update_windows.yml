---
- name: Actualización de servidores Windows
  hosts: all
  tasks:
  - name: Instalar actualizaciones de Windows
    win_updates:
      category_names:
      - Critical Updates
      - Security Updates
      state: installed
    register: update_result

  - name: Informar actualizaciones aplicadas
    debug:
      msg: "Se han aplicado {{ update_result.installed_updates_count }} actualizaciones en {{ inventory_hostname }}"

  - name: Actualizaciones aplicadas
    debug:
      var: "Se aplicaron las siguientes actualizaciones en {{ inventory_hostname }}: {{ update_result.title }}"
