---
- name: Create a EC2 in AWS
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
  - name: Create a EC2 instance
    amazon.aws.ec2_instance:
      name: "Ansible-EC2-Instance"
      key_name: "ansible-demo"
      instance_type: t3.small
      image_id: ami-05cf1e9f73fbad2e2
      region: us-east-1
      security_group: default
      network_interfaces:
      - assign_public_ip: yes
      tags:
        Environment: Ansible
    register: ec2

  - name: Instances ID
    debug:
      msg: "ID: {{ item.instance_id }} - State: {{ item.state.name }} - Public DNS: {{ item.public_ip_address }}"