#       seconds: 20

 #  - name: Verificando ping hacia equipo
 #    ansible.builtin.command: /bin/ping -c 2 {{ ansible_host }}
 #    register: resultado
 #    delegate_to: localhost
 #    ignore_errors: true

    - name: Informar resultado del ping
      ansible.builtin.debug:
        msg: "El resultado del ping es {{ resultado.stdout }}"
      ignore_errors: true
