---
- name: Apagar servidor Windows usando win_shell
  hosts: all
  gather_facts: false

  tasks:
    - name: Verificando ping hacia equipo
      ansible.builtin.command: /usr/sbin/ping -c 2 {{ ansible_host }}
      register: resultado
      delegate_to: localhost
      ignore_errors: true

