---
- name: Validar servicio web
  hosts: all
  gather_facts: true
  tasks:
    - name: Verificar espacio en /var
      ansible.builtin.shell: "df -h /var | tail -1 | awk '{print $5}' | sed 's/%//'"
      register: var_usage

    - name: Informar espacio en /var
      ansible.builtin.debug:
        msg: "El espacio en /var es de {{ var_usage.stdout }}%"

    - name: Buscar archivos en /var/lib/nginx/tmp/ si el espacio en /var es mayor o igual al 90%
      find:
          paths: "/var/lib/nginx/tmp/"
          recurse: yes
          file_type: file
      register: archivos_encontrados
      when: var_usage.stdout|int >= 90

    - name: Borrar archivos encontrados
      file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ archivos_encontrados.files }}"
      when: var_usage.stdout|int >= 90
      
    - name: Informar que se eliminaron archivos
      ansible.builtin.debug:
        msg: "Se eliminaron {{ archivos_encontrados.matched }} archivos en /var/lib/nginx/tmp/ para liberar espacio"
      when: var_usage.stdout|int >= 90

    - name: Informar que no es necesario eliminar archivos
      ansible.builtin.debug:
        msg: "No es necesario eliminar archivos en /var/lib/nginx/tmp/ ya que el espacio en /var es de {{ var_usage.stdout }}%"
      when: var_usage.stdout|int < 90

    - name: Informar que se va a reiniciar el servicio nginx
      ansible.builtin.debug:
        msg: "Se va a reiniciar el servicio nginx"
      ignore_errors: true

    - name: Reiniciar servicio nginx
      ansible.builtin.service:
        name: nginx
        state: restarted
      ignore_errors: true

    - name: Esperar 10 segundos para que el servicio nginx se reinicie
      ansible.builtin.pause:
        seconds: 5

    - name: Verificar estado del servicio nginx
      ansible.builtin.systemd:
        name: nginx
      register: nginx_status

    - name: Informar estado del servicio nginx
      ansible.builtin.debug:
        msg: "El estado del servicio nginx es {{ nginx_status.status.ActiveState }}"
      ignore_errors: true

    - name: Informar que se va a consultar la pagina web
      ansible.builtin.debug:
        msg: "Se va a consultar la pagina web para verificar que el servicio web se encuentra arriba"
      ignore_errors: true

    - name: Consultar pagina web
      uri:
        url: "http://192.168.3.34:8080"
        method: GET
        return_content: no
        status_code: 200
        timeout: "5"
      register: resultado
      ignore_errors: true

    - name: Informar resultado de la consulta a la pagina web esta arriba
      ansible.builtin.debug:
        msg: "La pagina web se encuentra arriba con un status code de {{ resultado.status }}"
      ignore_errors: true
      when: resultado.status == 200

    - name: Informar resultado de la consulta a la pagina web esta abajo
      ansible.builtin.debug:
        msg: "La pagina web se encuentra abajo con un status code de {{ resultado.status }}"
      ignore_errors: true
      when: resultado.status != 200

    - name: Informar que no se reinicio el servicio nginx
      ansible.builtin.debug:
        msg: "El servicio nginx no se reinicio correctamente"
      when: nginx_status.status.ActiveState != "active" and resultado.status != 200
      changed_when: True
      ignore_errors: true
      notify: 
      - Fallo en el reinicio

    - name: Informar que se reinicio el servicio nginx
      ansible.builtin.debug:
        msg: "El servicio nginx se reinicio correctamente"
      when: nginx_status.status.ActiveState == "active" and resultado.status == 200
      changed_when: True
      ignore_errors: true
      notify: 
      - Reinicio exitoso 

    
  handlers:
    - name: Reinicio exitoso
      community.general.mail:
        host: 192.168.3.2
        port: 25
        to: alan.rueda@datumredsoft.com
        from: Alan Rueda <alankewd@gmail.com>
        subject: "Pagina web funcionando correctamente"
        body: |
          Se detecto que la pagina web estaba caida por lo que se procedio a realizar el siguiente procedimiento.
          
          Se realizó el siguiente procedimiento:
          1. Se verificó el espacio en /var el cual era de {{ var_usage.stdout }}% 
          2. Se eliminaron archivos en /var/lib/nginx/tmp/ para liberar espacio.
          3. Se reinicio el servicio nginx y se verifico su estado el cual es {{ nginx_status.status.ActiveState }}.
          4. Se consulto la pagina web y se obtuvo un status code de {{ resultado.status }}.

          Con esto se garantiza que el servicio nginx se encuentra funcionando correctamente y la pagina web es accesible.
      delegate_to: localhost 

    - name: Fallo en el reinicio
      community.general.mail:
        host: 192.168.3.2
        port: 25
        to: alan.rueda@datumredsoft.com
        from: Alan Rueda <alankewd@gmail.com>
        subject: "Fallo en la pagina web"
        body: |
          Se detecto que la pagina web estaba caida por lo que se procedio a realizar el siguiente procedimiento.
          
          Se realizó el siguiente procedimiento:
          1. Se verificó el espacio en /var para validar si es necesario liberar espacio, el espacio es de {{ var_usage.stdout }}%
          2. Se reinicio el servicio nginx y se verifico su estado el cual es {{ nginx_status.status.ActiveState }}.
          3. Se consulto la pagina web y se obtuvo un status code de {{ resultado.status }}.

          A pesar de aplicar el procedimiento escrito en la parte superior el servicio nginx no se encuentra funcionando correctamente y la pagina web no es accesible. Por lo cual se ha aperturado el ticket # en la mesa de soporte.
      delegate_to: localhost