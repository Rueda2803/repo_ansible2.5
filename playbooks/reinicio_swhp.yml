- name: Reinicio switch HP
  hosts: all
  gather_facts: false
  tasks:
    - name: Informar inicio del reinicio
      ansible.builtin.debug:
        msg: "Iniciando reinicio del switch HP"
      delegate_to: localhost
          
    - name: Reinicio switch HP
      ansible.netcommon.cli_command:
        command: reload
        prompt: 
          - "System will be rebooted from primary image. Do you want to continue [y/n]?"
        answer: 
          - "y"
      ignore_errors: true

    - name: Verificiar que el comando se ejecuto correctamente
      ansible.builtin.wait_for: 
        host: 192.168.20.5
        port: 22
        state: stopped
        timeout: 300
      register: resultado
      delegate_to: localhost

    - name: Informar resultado del reinicio
      ansible.builtin.debug:
        msg: "El resultado del reinicio es exitoso"
      ignore_errors: true
      delegate_to: localhost
